name: Build & Publish Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: chalidnl

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/chalidnl/todoless-ngx-frontend:latest
            ghcr.io/chalidnl/todoless-ngx-frontend:${{ github.sha }}
          build-args: |
            VITE_GIT_COMMIT=${{ github.sha }}
            VITE_APP_VERSION=${{ github.ref_name }}

      - name: Build & push pocketbase
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pocketbase
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/chalidnl/todoless-ngx-pocketbase:latest
            ghcr.io/chalidnl/todoless-ngx-pocketbase:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
